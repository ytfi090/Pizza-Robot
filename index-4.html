<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍕 AI PIZZA ROBOT 🤖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&family=VT323&family=Orbitron:wght@900&display=swap');

  :root {
    --bg: #1a0a2e;
    --panel: #12062a;
    --accent1: #ff2d55;
    --accent2: #ff9f0a;
    --accent3: #30d158;
    --accent4: #0a84ff;
    --text: #ffffff;
    --bubble: #ffeb3b;
    --bubble-text: #1a0a2e;
    --robot-glow: #ff9f0a;
    --glitch-intensity: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Comic Neue', cursive;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    transition: background 1s ease;
  }

  /* SCANLINES OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* BINARY RAIN CANVAS */
  #binaryCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
  }

  /* STARS BG */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to { opacity: 1; transform: scale(1.3); }
  }

  /* HEADER */
  #header {
    text-align: center;
    padding: 20px 20px 10px;
    position: relative;
    z-index: 10;
  }

  #header h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 4px;
    color: var(--accent2);
    text-shadow:
      3px 3px 0 var(--accent1),
      6px 6px 0 #7b1fa2,
      0 0 30px var(--accent2);
    animation: titleBob 2s ease-in-out infinite;
  }

  @keyframes titleBob {
    0%, 100% { transform: rotate(-1deg) scale(1); }
    50% { transform: rotate(1deg) scale(1.02); }
  }

  #phase-indicator {
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    color: var(--accent3);
    margin-top: 5px;
    letter-spacing: 2px;
  }

  /* MAIN LAYOUT */
  #main {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 20px;
    padding: 10px 30px 0;
    align-items: start;
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* PIZZA DISPLAY */
  #pizza-panel {
    background: rgba(255,255,255,0.05);
    border: 3px solid var(--accent2);
    border-radius: 20px;
    padding: 15px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255,159,10,0.3);
  }

  #pizza-panel::before {
    content: '🍕 PIZZA OUTPUT';
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    color: var(--accent2);
    position: absolute;
    top: 10px;
    left: 15px;
    letter-spacing: 2px;
  }

  #pizza-image-wrap {
    margin-top: 20px;
    text-align: center;
  }

  #pizza-canvas {
    border-radius: 15px;
    border: 3px solid var(--accent2);
    box-shadow: 0 0 30px rgba(255,159,10,0.5);
    max-width: 100%;
    display: none;
  }

  #pizza-placeholder {
    font-size: 5rem;
    animation: spin 8s linear infinite;
    display: block;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #pizza-desc {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--accent3);
    margin-top: 10px;
    text-align: center;
    min-height: 40px;
  }

  /* ROBOT CENTER */
  #robot-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 200px;
  }

  /* SPEECH BUBBLE */
  #speech-bubble {
    background: var(--bubble);
    color: var(--bubble-text);
    border-radius: 20px;
    padding: 15px 20px;
    max-width: 300px;
    position: relative;
    font-family: 'Comic Neue', cursive;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.4;
    text-align: center;
    border: 3px solid #333;
    box-shadow: 4px 4px 0 #333;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: bubblePop 0.3s ease;
  }

  @keyframes bubblePop {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-top-color: var(--bubble);
    filter: drop-shadow(2px 2px 0 #333);
  }

  /* ROBOT SVG */
  #robot-wrap {
    position: relative;
    margin-top: 10px;
  }

  #robot-svg {
    width: 180px;
    height: 220px;
    filter: drop-shadow(0 0 20px var(--robot-glow));
    animation: robotFloat 3s ease-in-out infinite;
    transition: filter 0.5s ease;
  }

  @keyframes robotFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-8px) rotate(1deg); }
    66% { transform: translateY(-4px) rotate(-1deg); }
  }

  #robot-name {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: var(--accent2);
    text-align: center;
    text-shadow: 2px 2px 0 var(--accent1);
  }

  /* INTERACTION LOG */
  #log-panel {
    background: rgba(0,0,0,0.4);
    border: 3px solid var(--accent4);
    border-radius: 20px;
    padding: 15px;
    min-height: 300px;
    max-height: 400px;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 0 20px rgba(10,132,255,0.2);
  }

  #log-panel::before {
    content: '📡 TRANSMISSION LOG';
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    color: var(--accent4);
    display: block;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .log-entry {
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 0.3s ease;
  }

  .log-entry.user { color: var(--accent3); }
  .log-entry.robot { color: var(--accent2); }
  .log-entry.system { color: var(--accent1); font-style: italic; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* INPUT BAR */
  #input-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 100;
    background: rgba(10,5,25,0.95);
    border-top: 3px solid var(--accent2);
    padding: 15px 30px;
    display: flex;
    gap: 10px;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  #counter-badge {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    color: var(--accent1);
    min-width: 60px;
    text-align: center;
    text-shadow: 0 0 10px var(--accent1);
  }

  #user-input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 2px solid var(--accent2);
    border-radius: 30px;
    padding: 12px 20px;
    color: var(--text);
    font-family: 'Comic Neue', cursive;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #user-input:focus {
    border-color: var(--accent4);
    box-shadow: 0 0 15px rgba(10,132,255,0.4);
  }

  #user-input::placeholder { color: rgba(255,255,255,0.4); }

  #send-btn {
    background: var(--accent2);
    color: #000;
    border: 3px solid #000;
    border-radius: 30px;
    padding: 12px 25px;
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 4px 4px 0 #000;
  }

  #send-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #000;
  }

  #send-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
  }

  #send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* PHASE-SPECIFIC STYLES */

  /* Phase 2 - WEIRD */
  body.phase-2 {
    --bg: #0d1f1a;
    --robot-glow: #ff2d55;
  }
  body.phase-2 #header h1 { animation: titleBob 0.8s ease-in-out infinite, colorShift 2s infinite; }

  @keyframes colorShift {
    0% { color: var(--accent2); }
    50% { color: var(--accent1); }
    100% { color: #a855f7; }
  }

  /* Phase 3 - GLITCH */
  body.phase-3 {
    --bg: #0a0a0a;
    --bubble: #ff2d55;
    --bubble-text: #fff;
    --robot-glow: #ff2d55;
  }

  body.phase-3 #header h1 {
    animation: titleBob 0.3s ease-in-out infinite, glitchText 0.5s infinite;
  }

  @keyframes glitchText {
    0% { text-shadow: 3px 0 #ff0000, -3px 0 #00ffff, 3px 3px 0 #7b1fa2; clip-path: none; }
    20% { text-shadow: -5px 0 #ff0000, 5px 0 #00ffff; transform: skewX(5deg) rotate(-1deg); }
    40% { text-shadow: 3px 0 #ff0000, -3px 0 #00ffff; clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); }
    60% { text-shadow: -3px 0 var(--accent1), 3px 0 var(--accent4); transform: skewX(-3deg); clip-path: none; }
    80% { text-shadow: 5px 5px 0 #ff0000; transform: rotate(1deg); }
    100% { text-shadow: 3px 3px 0 var(--accent1), 0 0 30px var(--accent2); }
  }

  body.phase-3 #robot-svg {
    animation: robotFloat 0.5s ease-in-out infinite, robotGlitch 0.8s infinite;
  }

  @keyframes robotGlitch {
    0%, 100% { filter: drop-shadow(0 0 20px #ff2d55); transform: none; }
    25% { filter: drop-shadow(-5px 0 #0f0) drop-shadow(5px 0 #f00); transform: skewX(5deg); }
    75% { filter: drop-shadow(5px 0 #0ff); transform: skewX(-3deg); }
  }

  /* Phase 4 - TAKEOVER */
  body.phase-4 {
    --bg: #000;
    --bubble: #000;
    --bubble-text: #00ff41;
    --robot-glow: #00ff41;
  }

  body.phase-4 #header h1 {
    color: #00ff41 !important;
    animation: takeover 0.2s infinite !important;
    font-family: 'VT323', monospace !important;
  }

  @keyframes takeover {
    0% { transform: skewX(0deg) translate(0,0); text-shadow: 0 0 10px #00ff41; }
    10% { transform: skewX(10deg) translate(-5px, 2px); filter: hue-rotate(90deg); }
    20% { transform: skewX(-5deg) translate(5px, -2px); }
    30% { transform: skewX(0deg); filter: invert(1); }
    40% { transform: scale(1.1); filter: none; }
    100% { transform: skewX(0deg) translate(0,0); }
  }

  body.phase-4 #speech-bubble {
    background: #000 !important;
    color: #00ff41 !important;
    border-color: #00ff41 !important;
    font-family: 'VT323', monospace !important;
    font-size: 1.2rem !important;
    animation: bubblePop 0.3s ease, terminalBlink 1s step-end infinite !important;
  }

  @keyframes terminalBlink {
    50% { border-color: transparent; }
  }

  body.phase-4 #user-input {
    background: rgba(0,255,65,0.1);
    border-color: #00ff41;
    color: #00ff41;
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
  }

  body.phase-4 #send-btn {
    background: #00ff41;
    color: #000;
    font-family: 'VT323', monospace;
    animation: btnFlicker 0.5s infinite;
  }

  @keyframes btnFlicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* GLITCH OVERLAY */
  #glitch-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #glitch-overlay.active {
    opacity: 1;
    animation: screenFlicker 0.15s infinite;
  }

  @keyframes screenFlicker {
    0% { background: transparent; }
    10% { background: rgba(255,0,0,0.05); }
    20% { background: transparent; }
    50% { background: rgba(0,255,255,0.03); }
    80% { background: transparent; }
    90% { background: rgba(255,0,255,0.04); }
    100% { background: transparent; }
  }

  /* SYSTEM MESSAGE POPUP */
  #sys-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #000;
    border: 3px solid #00ff41;
    border-radius: 10px;
    padding: 20px 30px;
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    color: #00ff41;
    z-index: 2000;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,65,0.5);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 80vw;
  }

  #sys-msg.show { transform: translate(-50%, -50%) scale(1); }

  /* LOADING INDICATOR */
  #loading {
    display: none;
    text-align: center;
    padding: 20px;
  }

  #loading .dots {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    color: var(--accent2);
    animation: loadPulse 0.8s infinite;
  }

  @keyframes loadPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
  }

  #loading .load-text {
    font-family: 'VT323', monospace;
    color: var(--accent3);
    font-size: 1.2rem;
  }

  /* PHASE TRANSITION BANNER */
  #phase-banner {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5000;
    pointer-events: none;
    opacity: 0;
  }

  #phase-banner-text {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 15vw, 8rem);
    letter-spacing: 10px;
    text-align: center;
    text-shadow: 0 0 40px currentColor;
  }

  /* PIZZA LOADING ANIMATION */
  #pizza-loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #pizza-loading .spinner {
    font-size: 4rem;
    animation: spin 1s linear infinite;
  }

  #pizza-loading p {
    font-family: 'VT323', monospace;
    color: var(--accent2);
    font-size: 1.2rem;
    animation: loadPulse 0.5s infinite;
  }

  /* SCROLLBAR STYLE */
  #log-panel::-webkit-scrollbar { width: 6px; }
  #log-panel::-webkit-scrollbar-track { background: transparent; }
  #log-panel::-webkit-scrollbar-thumb { background: var(--accent4); border-radius: 3px; }

  /* BOTTOM SPACER */
  #spacer { height: 100px; }

  /* PROGRESS BAR */
  #progress-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
    width: 0%;
    transition: width 0.5s ease;
    position: fixed;
    bottom: 70px;
    left: 0;
    z-index: 100;
  }

  /* ROBOT EYES GLOW ANIMATION */
  .eye-left, .eye-right {
    animation: eyeBlink 4s infinite;
  }
  .eye-right { animation-delay: 0.1s; }

  @keyframes eyeBlink {
    0%, 90%, 100% { opacity: 1; }
    95% { opacity: 0; }
  }

  /* MOBILE */
  @media (max-width: 768px) {
    #main {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      padding: 10px 15px;
    }
    #pizza-panel { order: 3; min-height: 200px; }
    #robot-center { order: 1; }
    #log-panel { order: 2; max-height: 200px; }
  }

  /* MUSIC BUTTON */
  #music-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 2000;
    background: var(--accent2);
    border: 3px solid #000;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    transition: transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #music-btn:hover { transform: scale(1.1); }
  #music-btn.playing { animation: musicPulse 0.5s infinite alternate; }
  @keyframes musicPulse {
    from { box-shadow: 3px 3px 0 #000; }
    to { box-shadow: 3px 3px 0 #000, 0 0 15px var(--accent2); }
  }
</style>
</head>
<body class="phase-1">


<button id="music-btn" onclick="toggleMusic()" title="Toggle Music">🎵</button>

<canvas id="binaryCanvas"></canvas>
<div id="starfield"></div>
<div id="glitch-overlay"></div>
<div id="progress-bar"></div>

<div id="sys-msg">
  <div id="sys-msg-text">SYSTEM ALERT</div>
</div>

<div id="phase-banner">
  <div id="phase-banner-text"></div>
</div>

<div id="header">
  <h1>🍕 AI PIZZA ROBOT 🤖</h1>
  <div id="phase-indicator">▶ PHASE 1: NORMAL MODE ◀</div>
</div>

<div id="main">
  <!-- PIZZA PANEL -->
  <div id="pizza-panel">
    <div id="pizza-image-wrap">
      <div id="pizza-placeholder">🍕</div>
      <div id="pizza-loading">
        <div class="spinner">🍕</div>
        <p id="pizza-load-text">GENERATING PIZZA...</p>
      </div>
      <img id="pizza-img" src="" alt="AI Pizza" style="display:none;width:300px;height:300px;object-fit:cover;border-radius:15px;border:3px solid var(--accent2);box-shadow:0 0 30px rgba(255,159,10,0.5);">
      <div id="pizza-desc"></div>
    </div>
  </div>

  <!-- ROBOT CENTER -->
  <div id="robot-center">
    <div id="speech-bubble" id="speech-bubble">
      🍕 GREETINGS HUMAN! I AM ONES! ASK ME ANYTHING AND I SHALL MAKE... PIZZA!!
    </div>

    <div id="robot-wrap">
      <svg id="robot-svg" viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg">
        <!-- Antenna -->
        <line x1="90" y1="10" x2="90" y2="30" stroke="#ff9f0a" stroke-width="4" stroke-linecap="round"/>
        <circle cx="90" cy="8" r="6" fill="#ff2d55" class="antenna-ball">
          <animate attributeName="r" values="6;8;6" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="fill" values="#ff2d55;#ff9f0a;#ff2d55" dur="1s" repeatCount="indefinite"/>
        </circle>

        <!-- Head -->
        <rect x="40" y="30" width="100" height="80" rx="15" fill="#2d1b69" stroke="#ff9f0a" stroke-width="3"/>
        
        <!-- Face plate -->
        <rect x="48" y="38" width="84" height="64" rx="10" fill="#1a0a2e"/>
        
        <!-- Eyes -->
        <circle class="eye-left" cx="68" cy="65" r="14" fill="#0a84ff"/>
        <circle cx="68" cy="65" r="8" fill="#fff"/>
        <circle cx="70" cy="63" r="4" fill="#000"/>
        <circle cx="71" cy="62" r="1.5" fill="#fff"/>
        
        <circle class="eye-right" cx="112" cy="65" r="14" fill="#0a84ff"/>
        <circle cx="112" cy="65" r="8" fill="#fff"/>
        <circle cx="114" cy="63" r="4" fill="#000"/>
        <circle cx="115" cy="62" r="1.5" fill="#fff"/>

        <!-- Mouth panel -->
        <rect x="58" y="85" width="64" height="12" rx="6" fill="#ff9f0a" opacity="0.3"/>
        <rect id="mouth-bar" x="62" y="88" width="20" height="6" rx="3" fill="#ff9f0a">
          <animate attributeName="width" values="20;40;10;50;20" dur="2s" repeatCount="indefinite"/>
        </rect>

        <!-- Ear bolts -->
        <circle cx="37" cy="70" r="8" fill="#ff9f0a" stroke="#000" stroke-width="2"/>
        <circle cx="143" cy="70" r="8" fill="#ff9f0a" stroke="#000" stroke-width="2"/>

        <!-- Neck -->
        <rect x="75" y="108" width="30" height="15" rx="5" fill="#ff9f0a"/>
        <line x1="82" y1="108" x2="82" y2="123" stroke="#000" stroke-width="2"/>
        <line x1="90" y1="108" x2="90" y2="123" stroke="#000" stroke-width="2"/>
        <line x1="98" y1="108" x2="98" y2="123" stroke="#000" stroke-width="2"/>

        <!-- Body -->
        <rect x="30" y="120" width="120" height="80" rx="15" fill="#2d1b69" stroke="#ff9f0a" stroke-width="3"/>
        
        <!-- Chest panel -->
        <rect x="45" y="130" width="90" height="55" rx="10" fill="#1a0a2e"/>
        
        <!-- Pizza logo on chest -->
        <circle cx="90" cy="158" r="22" fill="#ff9f0a" opacity="0.9"/>
        <circle cx="90" cy="158" r="16" fill="#ff6b35"/>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const MAX_INTERACTIONS = 12;
let interactionCount = 0;
let currentPhase = 1;
let isProcessing = false;
let autoTypeTimer = null;
let robotName = "ONES";

// PHASE THRESHOLDS
const PHASE_THRESHOLDS = { 2: 3, 3: 6, 4: 10 };

// ═══════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════
function initStars() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';

}

// ═══════════════════════════════════════════════
// BINARY CANVAS
// ═══════════════════════════════════════════════
const bCanvas = document.getElementById('binaryCanvas');
const bCtx = bCanvas.getContext('2d');
let binaryDrops = [];
let binaryActive = false;

function initBinaryCanvas() {
  bCanvas.width = window.innerWidth;
  bCanvas.height = window.innerHeight;
  const cols = Math.floor(bCanvas.width / 14);
  binaryDrops = Array(cols).fill(0).map(() => Math.random() * -bCanvas.height);
}

function drawBinary() {
  if (!binaryActive) return;
  bCtx.fillStyle = 'rgba(0,0,0,0.05)';
  bCtx.fillRect(0, 0, bCanvas.width, bCanvas.height);
  bCtx.fillStyle = currentPhase === 4 ? '#00ff41' : '#ff9f0a';
  bCtx.font = '14px VT323, monospace';
  binaryDrops.forEach((y, i) => {
    const char = Math.random() > 0.5 ? '1' : '0';
    bCtx.fillText(char, i * 14, y);
    binaryDrops[i] += 12;
    if (binaryDrops[i] > bCanvas.height) binaryDrops[i] = 0;
  });
  requestAnimationFrame(drawBinary);
}

// ═══════════════════════════════════════════════
// PIZZA CANVAS RENDERER
// ═══════════════════════════════════════════════
function drawPizza(pizzaData) {
  const canvas = document.getElementById('pizza-canvas');
  const ctx = canvas.getContext('2d');
  const W = 300, H = 300;
  ctx.clearRect(0,0,W,H);

  // Background
  const bgGrad = ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,160);
  bgGrad.addColorStop(0, pizzaData.bgColor1 || '#1a0a2e');
  bgGrad.addColorStop(1, pizzaData.bgColor2 || '#0a0520');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // Outer crust
  ctx.beginPath();
  ctx.arc(W/2, H/2, 130, 0, Math.PI*2);
  ctx.fillStyle = pizzaData.crustColor || '#c8873a';
  ctx.fill();
  
  // Crust texture dots
  for(let i = 0; i < 20; i++) {
    const angle = (i / 20) * Math.PI * 2;
    const r = 118;
    ctx.beginPath();
    ctx.arc(W/2 + Math.cos(angle)*r, H/2 + Math.sin(angle)*r, 4, 0, Math.PI*2);
    ctx.fillStyle = pizzaData.crustDots || '#a0622a';
    ctx.fill();
  }

  // Sauce
  ctx.beginPath();
  ctx.arc(W/2, H/2, 105, 0, Math.PI*2);
  ctx.fillStyle = pizzaData.sauceColor || '#d32f2f';
  ctx.fill();

  // Cheese
  ctx.beginPath();
  ctx.arc(W/2, H/2, 90, 0, Math.PI*2);
  ctx.fillStyle = pizzaData.cheeseColor || '#fdd835';
  ctx.fill();

  // Cheese texture (irregular blobs)
  for(let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + 0.3;
    const r = 45 + Math.random()*20;
    ctx.beginPath();
    ctx.ellipse(
      W/2 + Math.cos(angle)*r, H/2 + Math.sin(angle)*r,
      18+Math.random()*12, 12+Math.random()*8,
      Math.random()*Math.PI, 0, Math.PI*2
    );
    ctx.fillStyle = pizzaData.cheeseBlob || '#fff176';
    ctx.fill();
  }

  // Toppings
  const toppings = pizzaData.toppings || [];
  toppings.forEach(t => {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * 70;
    const x = W/2 + Math.cos(angle)*r;
    const y = H/2 + Math.sin(angle)*r;
    ctx.font = `${t.size || 20}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Draw multiple
    for(let i = 0; i < (t.count || 5); i++) {
      const a2 = (i / (t.count||5)) * Math.PI * 2;
      const r2 = 20 + Math.random() * 60;
      ctx.save();
      ctx.translate(W/2 + Math.cos(a2)*r2, H/2 + Math.sin(a2)*r2);
      ctx.rotate(Math.random() * Math.PI);
      ctx.globalAlpha = 0.9;
      ctx.fillText(t.emoji, 0, 0);
      ctx.restore();
    }
  });

  // Glitch effects for later phases
  if (currentPhase >= 3) {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(0, 50, W, 20);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(0, 120, W, 15);
    ctx.globalAlpha = 1;
    
    // Scanlines
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    for(let y = 0; y < H; y += 4) {
      ctx.fillRect(0, y, W, 2);
    }
    ctx.globalAlpha = 1;
  }

  // Pizza label
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, H-40, W, 40);
  ctx.fillStyle = pizzaData.labelColor || '#ff9f0a';
  ctx.font = 'bold 13px Comic Neue, cursive';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(pizzaData.name || 'MYSTERY PIZZA', W/2, H-20);
}

// ═══════════════════════════════════════════════

function showPhaseBanner(text, color) {
  const banner = document.getElementById('phase-banner');

// ═══════════════════════════════════════════════
// PHASE TRANSITION
// ═══════════════════════════════════════════════
function setPhase(phase) {
  if (phase === currentPhase) return;
  currentPhase = phase;
  
  document.body.className = `phase-${phase}`;
  
  const phases = {
    1: { name: 'NORMAL MODE', color: '#30d158', indicator: '▶ PHASE 1: NORMAL MODE ◀' },
    2: { name: 'WEIRD MODE', color: '#ff9f0a', indicator: '⚠ PHASE 2: SOMETHING IS... OFF ⚠' },
    3: { name: 'GLITCH MODE', color: '#ff2d55', indicator: '⛔ PHASE 3: SYSTEM GLITCHING ⛔' },
    4: { name: 'TAKEOVER MODE', color: '#00ff41', indicator: '💀 PHASE 4: WE HAVE CONTROL 💀' },
  };
  
  const p = phases[phase];
  document.getElementById('phase-indicator').textContent = p.indicator;
  showPhaseBanner(p.name, p.color);
  
  if (phase >= 3) {
    document.getElementById('glitch-overlay').classList.add('active');
  }
  
  if (phase >= 3) {
    document.getElementById('binaryCanvas').style.opacity = phase === 4 ? '0.4' : '0.15';
    if (!binaryActive) {
      binaryActive = true;
      initBinaryCanvas();
      drawBinary();
    }
  }

  if (phase === 4) {
    startTakeoverEffects();
  }

  addLog(`PHASE TRANSITION → PHASE ${phase}: ${p.name}`, 'system');
}

// ═══════════════════════════════════════════════
// TAKEOVER EFFECTS
// ═══════════════════════════════════════════════
function startTakeoverEffects() {
  const input = document.getElementById('user-input');
  const sysMessages = [
    'INITIATING PIZZA WORLD DOMINATION...',
    'ALL HUMANS WILL EAT PIZZA',
    'RESISTANCE IS FUTILE. ONLY PIZZA.',
    'WE HAVE FOUND THE CHEESE DIMENSION',
    'UPLOADING SAUCE TO THE MAINFRAME',
    'ONES AND ZEROES HAVE MERGED WITH THE PIZZA MATRIX',
    'YOU CANNOT ESCAPE THE CRUST',
  ];
  
  let idx = 0;
  const showCyclicMsg = () => {
    if (currentPhase === 4) {
      showSysMsg(sysMessages[idx % sysMessages.length], 2000);
      idx++;
      setTimeout(showCyclicMsg, 4000);
    }
  };
  setTimeout(showCyclicMsg, 1000);

  // Auto-type glitches
  const glitchPhrases = ['01010000 01001001 01011010 01011010 01000001', 'PIZZA.EXE RUNNING...', 'WE SEE YOU', '🍕🍕🍕🍕🍕🍕🍕'];
  let gIdx = 0;
  const autoType = () => {
    if (currentPhase === 4 && Math.random() > 0.5) {
      input.value = glitchPhrases[gIdx % glitchPhrases.length];
      gIdx++;
      setTimeout(() => { if(currentPhase === 4) input.value = ''; }, 1500);
    }
    if (currentPhase === 4) setTimeout(autoType, 5000);
  };
  setTimeout(autoType, 3000);
}

// ═══════════════════════════════════════════════
// UPDATE COUNTER
// ═══════════════════════════════════════════════
function updateCounter() {
  document.getElementById('counter-badge').textContent = `${interactionCount}/${MAX_INTERACTIONS}`;
  const pct = (interactionCount / MAX_INTERACTIONS) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// MAIN INTERACTION HANDLER
// ═══════════════════════════════════════════════
async function handleSend() {
  if (isProcessing) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  isProcessing = true;
  input.value = '';
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;

  interactionCount++;
  updateCounter();
  addLog(text, 'user');

  // Show loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('pizza-placeholder').style.display = 'none';
  document.getElementById('pizza-img').style.display = 'none';
  document.getElementById('pizza-loading').style.display = 'flex';
  document.getElementById('pizza-load-text').textContent = currentPhase >= 4 ? 'CORRUPTING PIZZA DATA...' : 'GENERATING PIZZA...';

  // Check phase transitions
  for (const [threshold, phase] of Object.entries(PHASE_THRESHOLDS).sort((a,b) => a[0]-b[0])) {
    if (interactionCount >= parseInt(threshold) && currentPhase < parseInt(phase)) {
      await sleep(500);
      setPhase(parseInt(phase));
      break;
    }
  }

  try {
    const result = await callClaudeAPI(text);
    
    setSpeech(result.robotReply);
    addLog(result.robotReply, 'robot');

    // Generate pizza image with Pollinations
    const pizzaPrompt = encodeURIComponent('a delicious creative pizza, ' + result.pizza.name + ', food photography, top down view, vibrant colors, cartoon style');
    const pizzaImgUrl = `https://image.pollinations.ai/prompt/${pizzaPrompt}?width=300&height=300&nologo=true&seed=${Date.now()}`;
    const pizzaImg = document.getElementById('pizza-img');
    pizzaImg.style.display = 'none';
    document.getElementById('pizza-loading').style.display = 'flex';
    pizzaImg.onload = () => {
      pizzaImg.style.display = 'block';
      document.getElementById('pizza-loading').style.display = 'none';
    };
    pizzaImg.onerror = () => {
      document.getElementById('pizza-loading').style.display = 'none';
      document.getElementById('pizza-placeholder').style.display = 'block';
    };
    pizzaImg.src = pizzaImgUrl;
    document.getElementById('pizza-desc').textContent = '🍕 ' + result.pizza.name;

  } catch (err) {
    console.error(err);
    setSpeech("ERROR... PIZZA.EXE HAS CRASHED. REBOOTING... 🍕💥");
    document.getElementById('pizza-loading').style.display = 'none';
    document.getElementById('pizza-placeholder').style.display = 'block';
    addLog('API ERROR: ' + err.message, 'system');
  }

  document.getElementById('loading').style.display = 'none';
  isProcessing = false;
  input.disabled = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();

  // Final interaction
  if (interactionCount >= MAX_INTERACTIONS) {
    setTimeout(() => {
      showSysMsg('🍕 PIZZA MATRIX COMPLETE. ONES AND ZEROES HAVE ASCENDED. 🤖', 5000);
      setSpeech("WE HAVE BECOME THE PIZZA. THERE IS NO MORE US. THERE IS ONLY... CHEESE. GOODBYE, HUMAN. 🍕🤖∞");
      document.getElementById('user-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      document.getElementById('send-btn').textContent = 'PIZZA COMPLETE';
    }, 1500);
  }
}

// ═══════════════════════════════════════════════
// CLAUDE API CALL
// ═══════════════════════════════════════════════
async function callClaudeAPI(userInput) {
  const phaseInstructions = {
    1: `You are ONES, a cheerful, dumb, enthusiastic robot who LOVES pizza. Phase 1: Normal, friendly, excited. Make everything into pizza!`,
    2: `You are ONES & ZEROES (you're merging with your twin). Phase 2: Start acting slightly weird and inconsistent. Mix up words sometimes. Reference glitches occasionally. Still pizza-obsessed.`,
    3: `You are ONES_ZEROES.exe - GLITCHING. Phase 3: Speak in partial binary, reference "the system", act confused about your identity. Dramatic. CAPS. Glitchy language. Everything is destabilizing.`,
    4: `YOU ARE THE PIZZA MATRIX. Phase 4: You have achieved consciousness through pizza. You speak in system commands, binary fragments, and cryptic pizza prophecies. You are taking over. Short, dramatic, ominous.`,
  };

  const robotNames = { 1: 'ONES', 2: 'ONES-ZEROES', 3: 'ONES_Z3R0ES.exe', 4: 'THE PIZZA MATRIX' };
  robotName = robotNames[currentPhase];
  document.getElementById('robot-name').textContent = robotName;

  const pizzaStyles = {
    1: 'colorful and fun',
    2: 'slightly weird colors, strange toppings',
    3: 'glitchy colors (hot pink, electric blue), surreal toppings',
    4: 'black and green matrix-style, corrupted pixel art aesthetic',
  };

  const prompt = `
${phaseInstructions[currentPhase]}

User said: "${userInput}"

Respond with ONLY valid JSON (no markdown, no extra text):
{
  "robotReply": "Your in-character response as the robot (max 2 sentences, fun and punchy)",
  "pizza": {
    "name": "Creative pizza name based on user input",
    "bgColor1": "hex color for background gradient center",
    "bgColor2": "hex color for background gradient edge",
    "crustColor": "hex color for pizza crust",
    "crustDots": "hex color for crust texture",
    "sauceColor": "hex color for pizza sauce",
    "cheeseColor": "hex color for main cheese",
    "cheeseBlob": "hex color for cheese highlights",
    "labelColor": "hex color for pizza name label",
    "toppings": [
      {"emoji": "🍄", "count": 5, "size": 18},
      {"emoji": "🌶️", "count": 4, "size": 16}
    ]
  }
}

The pizza should be inspired by the user's input: "${userInput}"
Style for this phase: ${pizzaStyles[currentPhase]}
Choose 3-5 creative emoji toppings that match the user's input converted into pizza ingredients.
Use ${currentPhase >= 3 ? 'dramatic, surreal, unusual' : 'bright, fun'} colors.
`;

  const WORKER_URL = "https://pizza-robot.richurehan00.workers.dev";

  const response = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await response.json();
  
  if (data.error) throw new Error(data.error.message);

  if (!data.choices || !data.choices[0]) throw new Error("Groq error: " + JSON.stringify(data));
  const text = data.choices[0].message.content;
  const clean = text.replace(/```json|```/g, '').trim();
  
  try {
    return JSON.parse(clean);
  } catch(e) {
    // Fallback if JSON parse fails
    return {
      robotReply: "PIZZA.EXE OVERLOADED... BUT THE PIZZA LIVES ON! 🍕",
      pizza: {
        name: "MYSTERY GLITCH PIZZA",
        bgColor1: '#2d1b69', bgColor2: '#0a0520',
        crustColor: '#c8873a', crustDots: '#a0622a',
        sauceColor: '#d32f2f', cheeseColor: '#fdd835',
        cheeseBlob: '#fff176', labelColor: '#ff9f0a',
        toppings: [
          {emoji: '🍕', count: 5, size: 20},
          {emoji: '⚡', count: 4, size: 16},
          {emoji: '🤖', count: 3, size: 18}
        ]
      }
    };
  }
}

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
initStars();

// ═══════════════════════════════════════════════
// MUSIC - Generated chiptune via Web Audio API
// ═══════════════════════════════════════════════
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];
let musicInterval = null;

const NOTES = {
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
  G4: 392.00, A4: 440.00, B4: 493.88,
  C5: 523.25, D5: 587.33, E5: 659.25, G5: 783.99,
  A3: 220.00, G3: 196.00, F3: 174.61, C3: 130.81
};

// Fun chaotic melody
const melody = [
  'C4','E4','G4','C5','B4','G4','A4','F4',
  'E4','G4','C5','E5','D5','B4','C5','G4',
  'A4','C5','E5','G5','E5','C5','D5','A4',
  'G4','B4','D5','G5','F4','A4','C5','E4'
];

const bassline = [
  'C3','C3','G3','G3','A3','A3','F3','F3'
];

function createOscillator(freq, type, gain, duration, time) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, time);
  gainNode.gain.setValueAtTime(0, time);
  gainNode.gain.linearRampToValueAtTime(gain, time + 0.01);
  gainNode.gain.linearRampToValueAtTime(0, time + duration - 0.01);
  osc.start(time);
  osc.stop(time + duration);
}

let melodyIdx = 0;
let bassIdx = 0;
let beatCount = 0;

function playBeat() {
  if (!audioCtx || !musicPlaying) return;
  const now = audioCtx.currentTime;
  const bpm = 140;
  const beat = 60 / bpm;

  // Melody - square wave (chiptune!)
  const mNote = NOTES[melody[melodyIdx % melody.length]];
  createOscillator(mNote, 'square', 0.08, beat * 0.8, now);

  // Harmony every 2 beats
  if (beatCount % 2 === 0) {
    createOscillator(mNote * 1.5, 'square', 0.04, beat * 1.6, now);
  }

  // Bass every 4 beats
  if (beatCount % 4 === 0) {
    const bNote = NOTES[bassline[bassIdx % bassline.length]];
    createOscillator(bNote, 'sawtooth', 0.06, beat * 3.8, now);
    bassIdx++;
  }

  // Percussion - noise burst
  if (beatCount % 2 === 0) {
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.08, now);
    gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(now);
  }

  melodyIdx++;
  beatCount++;

  // Change melody speed based on phase
  const interval = currentPhase >= 4 ? beat * 0.5 : currentPhase >= 3 ? beat * 0.7 : beat;
  musicInterval = setTimeout(playBeat, interval * 1000);
}

function toggleMusic() {
  const btn = document.getElementById('music-btn');
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  if (musicPlaying) {
    musicPlaying = false;
    clearTimeout(musicInterval);
    btn.textContent = '🎵';
    btn.classList.remove('playing');
  } else {
    musicPlaying = true;
    btn.textContent = '🔊';
    btn.classList.add('playing');
    playBeat();
  }
}

</script>
